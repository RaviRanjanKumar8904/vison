<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%232563eb'/><path d='M30 50 L45 65 L70 35' stroke='white' stroke-width='10' fill='none'/></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Invigo Infotech Private Limited - Premium Internship & Skill Validation Platform offering certified programs across 30+ domains for B.Tech, Diploma, BCA, B.Sc, and MBA students." />
    <meta name="keywords" content="internship, AI, tech training, placement, certification, BA, B.Com, B.Tech, MBA, Invigo Infotech" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2563eb" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Invigo Infotech | Internship Portal" />
    <meta property="og:description" content="Premium Internship & Skill Validation Platform offering certified programs across 30+ domains." />
    <meta property="og:image" content="/logo.jpg" />
    <meta property="og:site_name" content="Invigo Infotech" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Invigo Infotech | Internship Portal" />
    <meta name="twitter:description" content="Premium Internship & Skill Validation Platform offering certified programs across 30+ domains." />
    <meta name="twitter:image" content="/logo.jpg" />

    <title>Invigo Infotech | Internship Portal</title>

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" />
    </noscript>

    <!-- Critical CSS -->
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; }
      #root { min-height: 100vh; }
      .app-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
      .app-loader .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.6s linear infinite; }
      .app-loader .text { font-size: 13px; color: #64748b; font-weight: 500; letter-spacing: 0.5px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loader">
        <div class="spinner"></div>
        <div class="text">Loading Invigo Infotech...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
